services:
  postgres:
    image: postgres:16-alpine
    container_name: 3dprintpilot-postgres
    environment:
      POSTGRES_DB: 3dprintpilot
      POSTGRES_USER: 3dprintpilot
      POSTGRES_PASSWORD: 3dprintpilot
    ports:
      - "5432:5432"
    volumes:
      - printpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 3dprintpilot -d 3dprintpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  printpilot-postgres-data:
